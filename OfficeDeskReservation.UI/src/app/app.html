@if (isLoggedIn()) {
<header class="top-navbar">
  <div class="navbar-content">

    <div class="logo-section">
      <a routerLink="/" class="logo-link">
        <div class="logo-icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="logo-svg">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
        </div>
        <span class="logo-text">DeskHub</span>
      </a>
    </div>

    <nav class="center-nav">
      @for (link of visibleNavLinks; track link.label) {
      <button class="nav-button"
              [routerLink]="link.path"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{exact: link.path === '/'}">
        {{ link.label }}
      </button>
      }
    </nav>

    <div class="right-section">
      <button class="notification-btn" title="Notifications">
        <i class="bi bi-bell"></i>
        <span class="badge-dot"></span>
      </button>

      <div class="vertical-divider"></div>

      <div class="profile-container">
        <button class="profile-trigger" (click)="toggleProfileMenu()">
          <div class="avatar-circle">{{ userInitials }}</div>
          <div class="user-text">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
          <i class="bi bi-chevron-down arrow-icon"></i>
        </button>

        @if (isProfileOpen) {
        <div class="profile-dropdown">
          <div class="dropdown-header">
            <div class="avatar-circle-large">{{ userInitials }}</div>
            <div class="dropdown-user-details">
              <p class="dropdown-name">{{ userName }}</p>
              <p class="dropdown-email">{{ userEmail }}</p>
            </div>
          </div>

          <div class="dropdown-line"></div>

          <button class="dropdown-item"><i class="bi bi-grid-1x2"></i> My Dashboard</button>
          <button class="dropdown-item"><i class="bi bi-person"></i> My Profile</button>
          <button class="dropdown-item"><i class="bi bi-gear"></i> Account Settings</button>

          <button class="dropdown-item"><i class="bi bi-question-circle"></i> Help & Support</button>

          <div class="dropdown-line"></div>

          <button class="dropdown-item logout-btn" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i> Sign out
          </button>
        </div>
        }
      </div>
    </div>

  </div>
</header>
}

<router-outlet></router-outlet>
