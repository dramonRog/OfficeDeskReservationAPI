<div class="login-container">
  <h2>Login into system</h2>

  <div class="form-group">
    <label>Email:</label>
    <input type="text" [(ngModel)]="email" class="form-control" placeholder="admin@example.com">
  </div>

  <div class="form-group">
    <label>Password:</label>
    <input type="password" [(ngModel)]="password" class="form-control" placeholder="••••••••">
  </div>

  <button (click)="login()" class="btn-primary">Login</button>

  @if (message) {
  <div class="alert-message" [class.success]="message === 'Success!'" [class.error]="message !== 'Success!'">
    {{ message }}
  </div>
  }
</div>
